services:
  app:
    build: .
    image: job-tracker-api
    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - mongo
      - redis

    restart: unless-stopped

  mongo:
    image: mongo:6

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    restart: unless-stopped

  redis:
    image: redis:alpine

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: